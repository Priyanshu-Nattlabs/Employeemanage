# VPS: TalentX at site root; InterviewX entry is /interviewx on the same host (see deploy/vps/nginx-edge*.conf).
# Usage (from this directory):
#   export VPS_PUBLIC_URL=https://saarthiworkforce.com
#   docker compose -f docker-compose.yml -f docker-compose.vps.yml up -d --build
services:
  frontend:
    build:
      args:
        NEXT_PUBLIC_BASE_PATH: ""
        # Safe default for production builds even if VPS_PUBLIC_URL is missing in shell.
        NEXT_PUBLIC_SAARTHIX_URL: ${VPS_PUBLIC_URL:-https://saarthiworkforce.com}
        NEXT_PUBLIC_INTERVIEWX_ORIGIN: ${VPS_PUBLIC_URL:-https://saarthiworkforce.com}/interviewx
