name: job-blueprint-v2

services:
  mongodb:
    image: mongo:7
    container_name: job-blueprint-v2-mongodb
    ports:
      - "27017:27017"
    volumes:
      - job-blueprint-v2-mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 6

  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: job-blueprint-v2-backend
    ports:
      - "8081:8081"
    depends_on:
      mongodb:
        condition: service_healthy
    env_file:
      - .env
    environment:
      PORT: 8081
      MONGODB_URI: ${BACKEND_MONGODB_URI:-mongodb://mongodb:27017/job_blueprint_v2}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/blueprint/all >/dev/null || exit 1"]
      interval: 15s
      timeout: 7s
      retries: 8

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8081
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
        NEXT_PUBLIC_SAARTHIX_URL: ${NEXT_PUBLIC_SAARTHIX_URL:-}
    container_name: job-blueprint-v2-frontend
    ports:
      - "3002:3001"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:8081
    restart: unless-stopped

volumes:
  job-blueprint-v2-mongo-data:

