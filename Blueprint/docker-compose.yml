name: job-blueprint-v2

services:
  mongodb:
    # mongo:5+ often requires CPU AVX; common VPS hosts fail healthchecks. Pin 4.4 for reliable deploys.
    # If this volume was created by Mongo 7+, run once: docker compose down && docker volume rm job-blueprint-v2_job-blueprint-v2-mongo-data (data loss).
    image: mongo:4.4
    container_name: job-blueprint-v2-mongodb
    # Host 27017 is often taken (local MongoDB / another stack). Backend still uses mongodb:27017 on the Docker network.
    ports:
      - "${BLUEPRINT_MONGO_HOST_PORT:-27027}:27017"
    volumes:
      - job-blueprint-v2-mongo-data:/data/db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mongo", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 10s
      retries: 24
      start_period: 60s

  # Runs on every `docker compose up`: if `blueprints` is empty, seeds from Excel under repo root; otherwise exits immediately.
  # Requires Docker Compose v2.20+ (service_completed_successfully). Excel files optional but at least one workbook must exist to seed.
  seed-ensure:
    image: node:22-bookworm-slim
    working_dir: /app/apps/api
    volumes:
      - .:/app
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongodb:27017/job_blueprint_v2
      # Faster first connect after mongo healthy (override if Mongo is slow to accept connections)
      BLUEPRINT_AUTO_SEED_CONNECT_RETRIES: "8"
      BLUEPRINT_AUTO_SEED_CONNECT_DELAY_MS: "1000"
    restart: "no"
    command:
      [
        "sh",
        "-c",
        "if [ ! -d node_modules/mongodb ]; then npm install; fi && node src/scripts/ensure-blueprint-seed.mjs",
      ]

  backend:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: job-blueprint-v2-backend
    # Host port defaults to 9081 so a local Nest/API on 8081 does not clash. Set BACKEND_PUBLISH_PORT=8081 to use 8081.
    ports:
      - "${BACKEND_PUBLISH_PORT:-9081}:8081"
    depends_on:
      mongodb:
        condition: service_healthy
      seed-ensure:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      PORT: 8081
      MONGODB_URI: ${BACKEND_MONGODB_URI:-mongodb://mongodb:27017/job_blueprint_v2}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/blueprint/all >/dev/null || exit 1"]
      interval: 15s
      timeout: 7s
      retries: 8

  # After pulling new routes (e.g. /dashboard/manager/home/), rebuild without cache or you may still run an old bundle:
  #   docker compose build --no-cache frontend && docker compose up -d frontend
  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        BACKEND_URL: http://backend:8081
        # Do not use root NEXT_PUBLIC_BASE_PATH here — it forces every route under /job-blueprint-v2/ (404 on /dashboard/...).
        # Leave unset or empty for http://localhost:3002/dashboard/... Set DOCKER_NEXT_PUBLIC_BASE_PATH=/job-blueprint-v2 when behind nginx.
        NEXT_PUBLIC_BASE_PATH: ${DOCKER_NEXT_PUBLIC_BASE_PATH:-}
        NEXT_PUBLIC_SAARTHIX_URL: ${NEXT_PUBLIC_SAARTHIX_URL:-}
        NEXT_PUBLIC_INTERVIEWX_ORIGIN: ${NEXT_PUBLIC_INTERVIEWX_ORIGIN:-}
    container_name: job-blueprint-v2-frontend
    # UI: http://localhost:3002/ (no path prefix unless DOCKER_NEXT_PUBLIC_BASE_PATH is set)
    ports:
      - "3002:3001"
    depends_on:
      backend:
        condition: service_healthy
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:8081
    restart: unless-stopped

  # Manual full re-seed from Excel (always runs seed-from-xlsx, does not check counts). Optional profile.
  # Run: docker compose --profile seed run --rm seed
  seed:
    profiles: ["seed"]
    image: node:22-bookworm-slim
    working_dir: /app/apps/api
    volumes:
      - .:/app
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongodb:27017/job_blueprint_v2
      # Prefer NEW JD 123.xlsx (current workbook); falls back if you only keep NEW JD.xlsx at repo root.
      BLUEPRINT_SEED_SOURCES: "/app/Job_Blueprint_Final_Phase13.xlsx,/app/NEW JD 123.xlsx"
    command: ["sh", "-c", "npm install && node src/scripts/seed-from-xlsx.mjs"]

  # Non-destructive upsert from NEW JD 123.xlsx only (no Phase13 catalog wipe). Used by VPS deploy after stack is up
  # so Excel updates apply even when blueprints is already populated (ensure-blueprint-seed skips in that case).
  # Run manually: docker compose run --rm seed-new-jd
  seed-new-jd:
    image: node:22-bookworm-slim
    working_dir: /app/apps/api
    volumes:
      - .:/app
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGODB_URI: mongodb://mongodb:27017/job_blueprint_v2
      BLUEPRINT_SEED_SOURCES: "/app/NEW JD 123.xlsx"
    restart: "no"
    command:
      - sh
      - -c
      - |
        if [ ! -f "/app/NEW JD 123.xlsx" ]; then
          echo "ℹ️  NEW JD 123.xlsx not found at Blueprint repo root — skipping NEW JD upsert."
          exit 0
        fi
        if [ ! -d node_modules/mongodb ]; then npm install; fi
        node src/scripts/seed-from-xlsx.mjs

volumes:
  job-blueprint-v2-mongo-data:

